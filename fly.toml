app = "event-driven-devin"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  SESSION_CAP_MAX = "5"
  SESSION_CAP_WINDOW_MINUTES = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
